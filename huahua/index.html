<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>可以做我妹妹吗？</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:"Microsoft YaHei",sans-serif;
    background:#fef5e7;
    background-image: radial-gradient(#fdf2e0 10%, transparent 11%),
            radial-gradient(#fdf2e0 10%, transparent 11%);
    background-size: 20px 20px;
    background-position: 0 0, 10px 10px;
    min-height:100vh;
    display:flex; flex-direction:column;
    justify-content:center; align-items:center;
    padding:20px;
  }
  .cat{
    width:180px; height:auto;
    margin-bottom:30px;
  }
  .txt{
    font-size:22px; color:#333;
    margin-bottom:30px;
  }
  .btn-group{
    display:flex; flex-direction:column;
    gap:15px;
  }
  .btn{
    padding:12px 30px;
    border:none; border-radius:999px;
    font-size:18px; cursor:pointer;
    transition:all 0.2s;
  }
  .btn-yes{
    background:#f9d594; color:#333;
  }
  .btn-no{
    background:#eee; color:#666;
  }
  .btn-yes:active{ transform:scale(0.96); }
</style>
</head>
<body>
<img src="R.jpg" alt="小猫" class="cat">
<div class="txt">可以做我妹妹吗？</div>
<div class="btn-group">
  <button class="btn btn-yes" onclick="window.open('momo.html', '_blank')">可以</button>
  <button class="btn btn-no" id="noBtn">不要</button>
</div>

<script>
// 让“不要”按钮跟随鼠标移动
const noBtn = document.getElementById('noBtn');
document.addEventListener('mousemove', (e) => {
  // 轻微延迟跟随，模拟“想跑又跑不掉”
  setTimeout(() => {
    const w = window.innerWidth - 80;
    const h = window.innerHeight - 60;
    const x = Math.random() * w;
    const y = Math.random() * h;
    noBtn.style.position = 'absolute';
    noBtn.style.left = x + 'px';
    noBtn.style.top = y + 'px';
  }, 100);
});
</script>
</body>
</html>
